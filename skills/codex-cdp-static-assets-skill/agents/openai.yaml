interface:
  display_name: "合规 CDP 静态资源采集"
  short_description: "被动记录浏览器自然加载的 JS、CSS 与其他静态资源"
  default_prompt: "使用 $codex-cdp-static-assets-skill 在授权范围内被动采集当前默认 Chrome 登录会话自然加载的静态资源。优先使用 Chrome DevTools MCP autoConnect；由我操作可见页面，你只选择唯一授权页、发现并确认精确主机、读取已完成静态响应、审计和合并。不要自动点击、主动请求资源、复制凭证或保存 API/HTML 正文。"
